<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الشرطي - نظام المخالفات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/form.css">
</head>
<body class="dashboard-body">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="18" r="16" fill="#c9a227"/>
          <path d="M10 22l4-10h8l4 10" stroke="#0b2d4d" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="sidebar-title">نظام الشرطي</div>
    </div>
    <nav class="sidebar-nav">
      <a href="police-dashboard.html" class="nav-item active">📋 إصدار مخالفة</a>
      <a href="#" class="nav-item" onclick="showCustomAlert('صفحة السجل قيد التطوير','info')">📜 سجل المخالفات</a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">🚪 تسجيل الخروج</button>
    </div>
  </aside>

  <main class="dashboard-main">
    <header class="dashboard-header">
      <div class="header-right">
        <h1>إصدار مخالفة مرورية جديدة</h1>
        <p class="welcome-text">مرحباً، <span id="officerNameDisplay">الشرطي</span></p>
      </div>
    </header>

    <div class="form-container">
      <form id="policeForm" onsubmit="submitViolation(event)">
        <!-- البيانات التلقائية -->
        <div class="form-section auto-data">
          <h3 class="section-title">👤 بيانات الشرطي (تلقائي)</h3>
          <div class="auto-badge">✅ يتم ملؤها تلقائياً من نظام الدخول</div>
          <div class="grid-3">
            <div class="form-group"><label class="form-label">الاسم</label><input type="text" class="form-input" id="pName" readonly></div>
            <div class="form-group"><label class="form-label">الرتبة</label><input type="text" class="form-input" id="pRank" readonly></div>
            <div class="form-group"><label class="form-label">الوحدة/التابع</label><input type="text" class="form-input" id="pUnit" readonly></div>
          </div>
        </div>

        <!-- بيانات المخالفة -->
        <div class="form-section">
          <h3 class="section-title">🚗 بيانات المخالفة</h3>
          <div class="grid-2">
            <div class="form-group"><label class="form-label">رقم رخصة السائق *</label><input type="text" class="form-input" id="pLicense" required placeholder="LIC-12345"></div>
            <div class="form-group"><label class="form-label">رقم اللوحة *</label><input type="text" class="form-input" id="pPlate" required placeholder="12345"></div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">نوع المركبة *</label>
              <select class="form-input" id="pVehicle" required>
                <option value="">اختر...</option>
                <option value="سيارة خاصة">سيارة خاصة</option>
                <option value="أجرة">سيارة أجرة</option>
                <option value="شاحنة">شاحنة</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">نوع المخالفة *</label>
              <select class="form-input" id="pType" required>
                <option value="">اختر...</option>
                <option value="تجاوز السرعة">تجاوز السرعة</option>
                <option value="وقوف خاطئ">وقوف خاطئ</option>
                <option value="عدم ربط الحزام">عدم ربط الحزام</option>
              </select>
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group"><label class="form-label">التاريخ *</label><input type="date" class="form-input" id="pDate" required></div>
            <div class="form-group"><label class="form-label">الوقت *</label><input type="time" class="form-input" id="pTime" required></div>
          </div>
          <div class="form-group"><label class="form-label">الموقع *</label><input type="text" class="form-input" id="pLocation" required placeholder="شارع الجمهورية، أمام المستشفى"></div>
          <div class="form-group"><label class="form-label">المبلغ (د.ل) *</label><input type="number" class="form-input" id="pAmount" required min="10" placeholder="150"></div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="window.location.href='index.html'">إلغاء</button>
          <button type="submit" class="btn-primary">✅ إصدار المخالفة</button>
        </div>
      </form>
    </div>
  </main>

  <div class="modal" id="successModal">
    <div class="modal-content">
      <div class="modal-icon success"><svg width="60" height="60" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#2e7d32" stroke-width="2"/><path d="M8 12l3 3 5-6" stroke="#2e7d32" stroke-width="2" stroke-linecap="round"/></svg></div>
      <h2>تم الإصدار بنجاح!</h2>
      <p>رقم المخالفة: <strong id="newVioNum">MXF-2026-001</strong></p>
      <button class="btn-primary" onclick="closeModal('successModal'); window.location.href='police-dashboard.html'">حسناً</button>
    </div>
  </div>

  <script src="assets/js/script.js"></script>
  <script src="assets/js/police.js"></script>
</body>
</html>
