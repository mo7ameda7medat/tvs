<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب - نظام إدارة المخالفات المرورية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="auth-body">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="18" cy="18" r="16" fill="#0b2d4d"/>
            <path d="M10 22l4-10h8l4 10" stroke="#c9a227" stroke-width="2" stroke-linejoin="round"/>
            <circle cx="14" cy="23" r="2" fill="#c9a227"/>
            <circle cx="22" cy="23" r="2" fill="#c9a227"/>
          </svg>
        </div>
        <h1>إنشاء حساب جديد</h1>
        <p>سجل كموظف في نظام المخالفات المرورية</p>
      </div>

      <form class="auth-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">الاسم الكامل *</label>
          <input type="text" class="form-input" placeholder="محمد أحمد علي" required id="regName">
        </div>

        <div class="form-group">
          <label class="form-label">البريد الإلكتروني *</label>
          <input type="email" class="form-input" placeholder="example@email.com" required id="regEmail">
        </div>

        <div class="form-group">
          <label class="form-label">رقم الهاتف *</label>
          <input type="tel" class="form-input" placeholder="0912345678" required id="regPhone">
        </div>

        <div class="form-group">
          <label class="form-label">الرتبة *</label>
          <select class="form-input" required id="regRank">
            <option value="">اختر الرتبة</option>
            <option value="جندي">جندي</option>
            <option value="عريف">عريف</option>
            <option value="رقيب">رقيب</option>
            <option value="ملازم">ملازم</option>
            <option value="ملازم أول">ملازم أول</option>
            <option value="نقيب">نقيب</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">كلمة المرور *</label>
          <input type="password" class="form-input" placeholder="••••••••" required id="regPassword" minlength="6">
        </div>

        <div class="form-group">
          <label class="form-label">تأكيد كلمة المرور *</label>
          <input type="password" class="form-input" placeholder="••••••••" required id="regConfirmPassword">
        </div>

        <button type="submit" class="btn-primary">إنشاء الحساب</button>

        <div class="auth-footer">
          <p>لديك حساب بالفعل؟ <a href="index.html">تسجيل الدخول</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="assets/js/script.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
