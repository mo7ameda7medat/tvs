<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>استعادة كلمة المرور - نظام إدارة المخالفات المرورية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="auth-body">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="11" width="18" height="11" rx="2" stroke="#c9a227" stroke-width="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4" stroke="#c9a227" stroke-width="2"/>
          </svg>
        </div>
        <h1>استعادة كلمة المرور</h1>
        <p>أدخل بريدك الإلكتروني لاستعادة كلمة المرور</p>
      </div>

      <form class="auth-form" onsubmit="handleForgotPassword(event)">
        <div class="form-group">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" class="form-input" placeholder="example@email.com" required id="resetEmail">
        </div>

        <button type="submit" class="btn-primary">إرسال رابط الاستعادة</button>

        <div class="auth-footer">
          <p>تذكرت كلمة المرور؟ <a href="index.html">تسجيل الدخول</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="assets/js/script.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
