<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قائمة المخالفات - نظام إدارة المخالفات المرورية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/table.css">
</head>
<body class="dashboard-body">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="18" r="16" fill="#c9a227"/>
          <path d="M10 22l4-10h8l4 10" stroke="#0b2d4d" stroke-width="2" stroke-linejoin="round"/>
          <circle cx="14" cy="23" r="2" fill="#0b2d4d"/>
          <circle cx="22" cy="23" r="2" fill="#0b2d4d"/>
        </svg>
      </div>
      <div class="sidebar-title">نظام المخالفات</div>
    </div>
    
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
          <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
          <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
          <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>لوحة التحكم</span>
      </a>
      <a href="issue-violation.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>إصدار مخالفة</span>
      </a>
      <a href="violations-list.html" class="nav-item active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>المخالفات</span>
      </a>
      <a href="search-violation.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
          <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>بحث</span>
      </a>
      <a href="profile.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="2"/>
          <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>الملف الشخصي</span>
      </a>
    </nav>
    
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>تسجيل الخروج</span>
      </button>
    </div>
  </aside>

  <main class="dashboard-main">
    <header class="dashboard-header">
      <div class="header-right">
        <h1>قائمة المخالفات</h1>
        <p class="welcome-text">عرض وإدارة جميع المخالفات المسجلة</p>
      </div>
      <div class="header-actions">
        <button class="btn-primary" onclick="window.location.href='issue-violation.html'">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          مخالفة جديدة
        </button>
      </div>
    </header>

    <div class="table-card">
      <div class="table-filters">
        <div class="filter-group">
          <input type="text" class="form-input" placeholder="البحث برقم المخالفة..." id="searchInput">
        </div>
        <div class="filter-group">
          <select class="form-input" id="statusFilter">
            <option value="">جميع الحالات</option>
            <option value="pending">غير مدفوعة</option>
            <option value="paid">مدفوعة</option>
          </select>
        </div>
        <button class="btn-secondary" onclick="filterViolations()">تصفية</button>
      </div>

      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>رقم المخالفة</th>
              <th>السائق</th>
              <th>المركبة</th>
              <th>نوع المخالفة</th>
              <th>التاريخ</th>
              <th>المبلغ</th>
              <th>الحالة</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody id="violationsTableBody">
            <!-- سيتم ملؤها بالJavaScript -->
          </tbody>
        </table>
      </div>

      <div class="table-pagination">
        <button class="btn-secondary" onclick="changePage(-1)">السابق</button>
        <span class="page-info">صفحة 1 من 5</span>
        <button class="btn-secondary" onclick="changePage(1)">التالي</button>
      </div>
    </div>
  </main>

  <script src="assets/js/script.js"></script>
  <script src="assets/js/violations-list.js"></script>
</body>
</html>
