    <div class="profile-container">
      <div class="profile-header">

            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#c9a227" stroke-width="2"/>
            <circle cx="12" cy="7" r="4" stroke="#c9a227" stroke-width="2"/>
          </svg>
        </div>
        <div class="profile-info">
          <h2 id="profileName">أحمد محمد علي</h2>
          <p class="profile-role" id="profileRole">ملازم أول</p>
          <p class="profile-id" id="profileId">OFF-2024-001</p>
        </div>
      </div>

      <div class="profile-sections">
        <div class="profile-section">
          <h3>المعلومات الشخصية</h3>
          <div class="info-grid">
            <div class="info-item">
              <span class="info-label">الاسم الكامل:</span>
              <span class="info-value">أحمد محمد علي</span>
            </div>
            <div class="info-item">
              <span class="info-label">البريد الإلكتروني:</span>
              <span class="info-value">ahmed.ali@traffic.gov.ly</span>
            </div>
            <div class="info-item">
              <span class="info-label">رقم الهاتف:</span>
              <span class="info-value">0912345678</span>
            </div>
            <div class="info-item">
              <span class="info-label">القسم:</span>
              <span class="info-value">إدارة المرور</span>
            </div>
          </div>
        </div>

        <div class="profile-section">
          <h3>إعدادات الحساب</h3>
          <button class="btn-primary" onclick="changePassword()">تغيير كلمة المرور</button>
          <button class="btn-secondary" onclick="updateProfile()">تحديث المعلومات</button>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/script.js"></script>
  <script src="assets/js/profile.js"></script>
